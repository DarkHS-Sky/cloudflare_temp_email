name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend_deploy.yaml"
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' && secrets.CLOUDFLARE_API_TOKEN != '' && secrets.FRONTEND_ENV != '' && secrets.FRONTEND_NAME != '' }}
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      FRONTEND_BRANCH: ${{ secrets.FRONTEND_BRANCH }}
      FRONTEND_ENV: ${{ secrets.FRONTEND_ENV }}
      FRONTEND_NAME: ${{ secrets.FRONTEND_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Deploy Frontend for ${{ github.ref_name }}
        working-directory: frontend
        run: |
          printf '%s' "$FRONTEND_ENV" > .env.prod
          pnpm install --frozen-lockfile
          pnpm run build
          pnpm exec wrangler pages deploy ./dist --project-name "$FRONTEND_NAME" --branch "${FRONTEND_BRANCH:-production}"
          echo "Deployed for ref ${{ github.ref_name }}"

  deploy-telegram-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' && secrets.CLOUDFLARE_API_TOKEN != '' && secrets.FRONTEND_ENV != '' && secrets.TG_FRONTEND_NAME != '' }}
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      FRONTEND_BRANCH: ${{ secrets.FRONTEND_BRANCH }}
      FRONTEND_ENV: ${{ secrets.FRONTEND_ENV }}
      TG_FRONTEND_NAME: ${{ secrets.TG_FRONTEND_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Deploy Telegram Frontend for ${{ github.ref_name }}
        working-directory: frontend
        run: |
          printf '%s' "$FRONTEND_ENV" > .env.prod
          pnpm install --frozen-lockfile
          pnpm run build:telegram
          pnpm exec wrangler pages deploy ./dist --project-name "$TG_FRONTEND_NAME" --branch "${FRONTEND_BRANCH:-production}"
          echo "Deployed telegram mini app for ref ${{ github.ref_name }}"
