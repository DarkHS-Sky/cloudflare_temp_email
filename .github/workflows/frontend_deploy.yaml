name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend_deploy.yaml"
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      FRONTEND_BRANCH: ${{ secrets.FRONTEND_BRANCH }}
      FRONTEND_ENV: ${{ secrets.FRONTEND_ENV }}
      FRONTEND_NAME: ${{ secrets.FRONTEND_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check required secrets
        id: preflight
        shell: bash
        run: |
          missing=()
          [[ -z "$CLOUDFLARE_ACCOUNT_ID" ]] && missing+=("CLOUDFLARE_ACCOUNT_ID")
          [[ -z "$CLOUDFLARE_API_TOKEN" ]] && missing+=("CLOUDFLARE_API_TOKEN")
          [[ -z "$FRONTEND_ENV" ]] && missing+=("FRONTEND_ENV")
          [[ -z "$FRONTEND_NAME" ]] && missing+=("FRONTEND_NAME")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skip frontend deploy. Missing secrets: ${missing[*]}"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        if: ${{ steps.preflight.outputs.ready == 'true' }}
        with:
          version: 10
          run_install: false

      - name: Install Node.js
        if: ${{ steps.preflight.outputs.ready == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Deploy Frontend for ${{ github.ref_name }}
        if: ${{ steps.preflight.outputs.ready == 'true' }}
        working-directory: frontend
        run: |
          printf '%s' "$FRONTEND_ENV" > .env.prod
          pnpm install --frozen-lockfile
          pnpm run build
          pnpm exec wrangler pages deploy ./dist --project-name "$FRONTEND_NAME" --branch "${FRONTEND_BRANCH:-production}"
          echo "Deployed for ref ${{ github.ref_name }}"

  deploy-telegram-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      FRONTEND_BRANCH: ${{ secrets.FRONTEND_BRANCH }}
      FRONTEND_ENV: ${{ secrets.FRONTEND_ENV }}
      TG_FRONTEND_NAME: ${{ secrets.TG_FRONTEND_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check required secrets
        id: preflight
        shell: bash
        run: |
          missing=()
          [[ -z "$CLOUDFLARE_ACCOUNT_ID" ]] && missing+=("CLOUDFLARE_ACCOUNT_ID")
          [[ -z "$CLOUDFLARE_API_TOKEN" ]] && missing+=("CLOUDFLARE_API_TOKEN")
          [[ -z "$FRONTEND_ENV" ]] && missing+=("FRONTEND_ENV")
          [[ -z "$TG_FRONTEND_NAME" ]] && missing+=("TG_FRONTEND_NAME")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skip telegram frontend deploy. Missing secrets: ${missing[*]}"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        if: ${{ steps.preflight.outputs.ready == 'true' }}
        with:
          version: 10
          run_install: false

      - name: Install Node.js
        if: ${{ steps.preflight.outputs.ready == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Deploy Telegram Frontend for ${{ github.ref_name }}
        if: ${{ steps.preflight.outputs.ready == 'true' }}
        working-directory: frontend
        run: |
          printf '%s' "$FRONTEND_ENV" > .env.prod
          pnpm install --frozen-lockfile
          pnpm run build:telegram
          pnpm exec wrangler pages deploy ./dist --project-name "$TG_FRONTEND_NAME" --branch "${FRONTEND_BRANCH:-production}"
          echo "Deployed telegram mini app for ref ${{ github.ref_name }}"
