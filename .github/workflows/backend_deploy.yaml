name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - "worker/**"
      - "frontend/**"
      - ".github/config/mail-parser-wasm-worker.patch"
      - ".github/workflows/backend_deploy.yaml"
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      BACKEND_TOML: ${{ secrets.BACKEND_TOML }}
      BACKEND_USE_MAIL_WASM_PARSER: ${{ secrets.BACKEND_USE_MAIL_WASM_PARSER }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      USE_WORKER_ASSETS: ${{ secrets.USE_WORKER_ASSETS }}
      USE_WORKER_ASSETS_WITH_TELEGRAM: ${{ secrets.USE_WORKER_ASSETS_WITH_TELEGRAM }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check required secrets
        id: preflight
        shell: bash
        run: |
          missing=()
          [[ -z "$CLOUDFLARE_ACCOUNT_ID" ]] && missing+=("CLOUDFLARE_ACCOUNT_ID")
          [[ -z "$CLOUDFLARE_API_TOKEN" ]] && missing+=("CLOUDFLARE_API_TOKEN")
          [[ -z "$BACKEND_TOML" ]] && missing+=("BACKEND_TOML")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skip backend deploy. Missing secrets: ${missing[*]}"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        id: pnpm-install
        if: ${{ steps.preflight.outputs.ready == 'true' }}
        with:
          version: 10
          run_install: false

      - name: Install Node.js
        if: ${{ steps.preflight.outputs.ready == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            frontend/pnpm-lock.yaml
            worker/pnpm-lock.yaml

      - name: Build frontend assets for Worker
        if: ${{ steps.preflight.outputs.ready == 'true' && env.USE_WORKER_ASSETS == 'true' }}
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          if [ "$USE_WORKER_ASSETS_WITH_TELEGRAM" = "true" ]; then
            pnpm run build:telegram:pages
          else
            pnpm run build:pages
          fi

      - name: Deploy Backend for ${{ github.ref_name }}
        if: ${{ steps.preflight.outputs.ready == 'true' }}
        working-directory: worker
        run: |
          printf '%s' "$BACKEND_TOML" > wrangler.toml
          pnpm install --frozen-lockfile

          if [ "$BACKEND_USE_MAIL_WASM_PARSER" = "true" ]; then
            pnpm add mail-parser-wasm-worker
            git apply ../.github/config/mail-parser-wasm-worker.patch
          fi

          pnpm run deploy
          echo "Deployed for ref ${{ github.ref_name }}"
