name: Deploy Frontend with Pages Functions

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "pages/**"
      - ".github/workflows/frontend_pagefunction_deploy.yaml"
  workflow_dispatch:

concurrency:
  group: deploy-pages-functions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' && secrets.CLOUDFLARE_API_TOKEN != '' && secrets.PAGE_TOML != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      PAGE_TOML: ${{ secrets.PAGE_TOML }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Build frontend for Pages Functions
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run build:pages

      - name: Deploy Frontend for ${{ github.ref_name }}
        working-directory: pages
        run: |
          printf '%s' "$PAGE_TOML" > wrangler.toml
          pnpm install --no-frozen-lockfile
          pnpm run deploy
          echo "Deployed Pages Functions frontend for ref ${{ github.ref_name }}"
