name: Deploy Frontend with Pages Functions

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "pages/**"
      - ".github/workflows/frontend_pagefunction_deploy.yaml"
  workflow_dispatch:

concurrency:
  group: deploy-pages-functions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      PAGE_TOML: ${{ secrets.PAGE_TOML }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check required secrets
        id: preflight
        shell: bash
        run: |
          missing=()
          [[ -z "$CLOUDFLARE_ACCOUNT_ID" ]] && missing+=("CLOUDFLARE_ACCOUNT_ID")
          [[ -z "$CLOUDFLARE_API_TOKEN" ]] && missing+=("CLOUDFLARE_API_TOKEN")
          [[ -z "$PAGE_TOML" ]] && missing+=("PAGE_TOML")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skip Pages Functions deploy. Missing secrets: ${missing[*]}"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        if: ${{ steps.preflight.outputs.ready == 'true' }}
        with:
          version: 10
          run_install: false

      - name: Install Node.js
        if: ${{ steps.preflight.outputs.ready == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend for Pages Functions
        if: ${{ steps.preflight.outputs.ready == 'true' }}
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run build:pages

      - name: Deploy Frontend for ${{ github.ref_name }}
        if: ${{ steps.preflight.outputs.ready == 'true' }}
        working-directory: pages
        run: |
          printf '%s' "$PAGE_TOML" > wrangler.toml
          pnpm install --no-frozen-lockfile
          pnpm run deploy
          echo "Deployed Pages Functions frontend for ref ${{ github.ref_name }}"
